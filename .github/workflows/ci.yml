name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    name: Backend (API) — lint + typecheck + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bmd
          POSTGRES_PASSWORD: bmd
          POSTGRES_DB: bmd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: cd apps/api && npx prisma generate
      - run: cd apps/api && npx prisma migrate deploy
        env:
          DATABASE_URL: postgres://bmd:bmd@localhost:5432/bmd_test
      - run: npm run lint --workspace apps/api
      - run: npm run typecheck --workspace apps/api
      - run: npm test --workspace apps/api -- --coverage
        env:
          DATABASE_URL: postgres://bmd:bmd@localhost:5432/bmd_test
          JWT_SECRET: test-secret-32-chars-minimum-length
          OTP_PEPPER: test-pepper

  web:
    name: Web (Next.js) — lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace apps/web
      - run: npm run typecheck --workspace apps/web
      - run: npm run build --workspace apps/web
