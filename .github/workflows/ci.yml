name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    name: Backend (API) · typecheck + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bmd
          POSTGRES_PASSWORD: bmd
          POSTGRES_DB: bmd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          # Désactive le téléchargement automatique des binaires Prisma à l'install
          PRISMA_SKIP_POSTINSTALL_GENERATE: "true"

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Apply DB migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: postgres://bmd:bmd@localhost:5432/bmd_test

      - name: Typecheck
        run: npm run typecheck --workspace apps/api

      - name: Run tests
        run: npm test --workspace apps/api
        env:
          DATABASE_URL: postgres://bmd:bmd@localhost:5432/bmd_test
          JWT_SECRET: test-secret-32-chars-minimum-length
          OTP_PEPPER: test-pepper-for-ci-only

  web:
    name: Web (Next.js) · typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck --workspace apps/web

      - name: Build
        run: npm run build --workspace apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
