name: Deploy

# Déploiement auto sur push to main (après que le CI ait passé).
# Web → Vercel · API → Railway. À adapter selon ta target.
#
# Secrets requis dans GitHub Settings → Secrets and variables → Actions :
#   - VERCEL_TOKEN (depuis vercel.com/account/tokens)
#   - VERCEL_ORG_ID, VERCEL_PROJECT_ID (depuis .vercel/project.json après vercel link)
#   - RAILWAY_TOKEN (depuis railway.com/account/tokens)
#   - RAILWAY_API_SERVICE_ID

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # ne PAS annuler les déploiements en cours

jobs:
  wait-for-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for typecheck + tests + build
        # Bloque le déploiement tant que le workflow CI principal n'est pas vert.
        # Si tu veux déployer en parallèle plutôt qu'en séquence, retire cette
        # gate et active "Required status checks" dans les branch protection rules.
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: Web (Next.js) · typecheck + build
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20

  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    needs: wait-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - name: Build for Vercel
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web

  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    needs: wait-for-ci
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH
      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_API_SERVICE_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        working-directory: apps/api

  smoke-test:
    name: Smoke tests post-deploy
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-api]
    steps:
      - name: API health
        run: |
          for i in {1..6}; do
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.backmesdo.com/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ API health OK"
              exit 0
            fi
            echo "Try $i: status=$STATUS, retrying..."
          done
          echo "❌ API health KO après 1 min"
          exit 1

      - name: Web reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app.backmesdo.com/login)
          [ "$STATUS" = "200" ] && echo "✓ Web OK" || (echo "❌ Web KO ($STATUS)" && exit 1)
