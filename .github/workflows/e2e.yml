name: E2E Tests (Playwright)

# Tests E2E sur 3 viewports : desktop-chrome / mobile-iphone / tablet-ipad.
# Plus lourds que les tests unitaires (boot API + DB + Web), donc on les
# tourne uniquement sur les PR vers main, pas sur les pushes directs.

on:
  pull_request:
    branches: [main]
  workflow_dispatch: # permet déclenchement manuel depuis l'UI GitHub

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright · 3 viewports
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bmd
          POSTGRES_PASSWORD: bmd
          POSTGRES_DB: bmd_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://bmd:bmd@localhost:5432/bmd_e2e
      JWT_SECRET: e2e-secret-32-chars-minimum-length
      OTP_PEPPER: e2e-pepper-16ch
      OTP_DELIVERY_MODE: console
      NODE_ENV: development
      WEB_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers (Chromium + WebKit + Firefox)
        run: npx playwright install --with-deps chromium webkit firefox
        working-directory: apps/e2e

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Apply DB migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma

      - name: Start API + Web (background)
        run: |
          # Démarre l'API
          npm run dev --workspace apps/api &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          # Démarre le Web build pour que le test ait un mode prod-like
          npm run build --workspace apps/web
          npm run start --workspace apps/web &
          WEB_PID=$!
          echo "WEB_PID=$WEB_PID" >> $GITHUB_ENV
          # Attend que les deux soient up
          npx wait-on http://localhost:4000/health http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: apps/e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7
