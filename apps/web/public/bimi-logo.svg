<?xml version="1.0" encoding="UTF-8"?>
<!--
  BIMI logo BMD · conforme au profil "SVG Tiny PS" (BIMI v1).

  Contraintes respectées (https://bimigroup.org/bimi-svg-faq/) :
   - version="1.2" baseProfile="tiny-ps" (mandatoire)
   - <title> obligatoire
   - viewBox carré (0 0 400 400)
   - Pas de <script>, pas d'animation, pas d'external href
   - Pas de filter / mask / clipPath
   - Pas de font externe (les <text> peuvent fallback sur système)
   - < 32 KB
   - xmlns sur la racine uniquement

  Affichage : la plupart des clients (Gmail, Apple Mail, Yahoo) recadrent
  en cercle. On garantit que le contenu utile est dans un cercle 380×380.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     version="1.2"
     baseProfile="tiny-ps"
     viewBox="0 0 400 400"
     width="400" height="400">
  <title>BMD</title>
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4E4C1"/>
      <stop offset="40%" stop-color="#E8A33D"/>
      <stop offset="100%" stop-color="#B5462E"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0.3" y1="0.3" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A2244"/>
      <stop offset="100%" stop-color="#0E0B14"/>
    </linearGradient>
  </defs>

  <!-- Médaillon de fond (sera recadré en cercle par les clients mail) -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Bordure dorée extérieure -->
  <circle cx="200" cy="200" r="190" fill="none"
          stroke="url(#goldGrad)" stroke-width="6"/>

  <!-- Bordure dorée intérieure (effet blason) -->
  <circle cx="200" cy="200" r="170" fill="none"
          stroke="#E8A33D" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Cadre hexagonal tribal -->
  <polygon points="200,75 304,135 304,265 200,325 96,265 96,135"
           fill="none" stroke="url(#goldGrad)" stroke-width="3.5"/>

  <!-- Crest intérieur -->
  <polygon points="200,103 280,150 280,250 200,297 120,250 120,150"
           fill="#0E0B14"
           stroke="#E8A33D" stroke-width="0.8"/>

  <!-- Lettres BMD -->
  <text x="200" y="225" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="78" font-weight="700"
        fill="url(#goldGrad)">BMD</text>

  <!-- Baseline -->
  <text x="200" y="258" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="11" letter-spacing="4"
        fill="#E8A33D">BACK · MES · DO</text>

  <!-- Étoile haut -->
  <polygon points="200,52 204,64 217,64 207,72 211,84 200,77 189,84 193,72 183,64 196,64"
           fill="#E8A33D"/>

  <!-- Cowries latérales (motif africain) -->
  <ellipse cx="80" cy="200" rx="6" ry="10" fill="#E8A33D"/>
  <ellipse cx="320" cy="200" rx="6" ry="10" fill="#E8A33D"/>
</svg>
