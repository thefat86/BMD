<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4E4C1"/>
      <stop offset="40%" stop-color="#E8A33D"/>
      <stop offset="100%" stop-color="#B5462E"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="0.3" cy="0.3" r="0.9">
      <stop offset="0%" stop-color="#2A2244"/>
      <stop offset="100%" stop-color="#0E0B14"/>
    </radialGradient>
  </defs>

  <!-- Square background with rounded corners (PWA maskable safe zone) -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Decorative dashed inner ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#E8A33D" stroke-width="1.5" stroke-dasharray="6 8" opacity="0.4"/>

  <!-- Hexagonal tribal frame -->
  <polygon points="256,96 388,168 388,344 256,416 124,344 124,168"
           fill="none" stroke="url(#goldGrad)" stroke-width="6"/>

  <!-- Inner crest -->
  <polygon points="256,128 360,184 360,328 256,384 152,328 152,184"
           fill="#0E0B14" opacity="0.85"/>

  <!-- BMD letters -->
  <text x="256" y="295" text-anchor="middle"
        font-family="Georgia, serif"
        font-size="100" font-weight="700"
        fill="url(#goldGrad)" letter-spacing="3">BMD</text>

  <!-- Top star -->
  <polygon points="256,72 261,87 277,87 264,97 269,112 256,103 243,112 248,97 235,87 251,87"
           fill="#E8A33D"/>
</svg>
