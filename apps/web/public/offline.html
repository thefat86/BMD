<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BMD · Hors ligne</title>
<style>
  body {
    margin: 0;
    background: #0E0B14;
    color: #F4E4C1;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    text-align: center;
  }
  .card {
    max-width: 400px;
  }
  .logo {
    font-family: Georgia, serif;
    font-size: 60px;
    font-weight: 700;
    color: #E8A33D;
    margin-bottom: 10px;
  }
  h1 {
    font-family: Georgia, serif;
    font-weight: 600;
    font-size: 28px;
    margin: 18px 0 12px;
  }
  p {
    color: #E8D5B7;
    line-height: 1.6;
    font-size: 15px;
  }
  button {
    margin-top: 24px;
    padding: 12px 28px;
    border-radius: 12px;
    background: linear-gradient(135deg, #E8A33D, #B5462E);
    color: #16111E;
    border: none;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">BMD</div>
  <p style="font-size:11px;letter-spacing:4px;color:#C9A24A;text-transform:uppercase">BACK · MES · DO</p>
  <h1>Tu es hors ligne</h1>
  <p>Pas de connexion détectée. BMD a besoin d'internet pour synchroniser tes données.<br><br>Vérifie ta connexion et réessaie.</p>
  <button onclick="location.reload()">↻ Réessayer</button>
</div>
</body>
</html>
