version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: bmd-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: bmd
      POSTGRES_PASSWORD: bmd
      POSTGRES_DB: bmd_dev
    volumes:
      - bmd_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bmd"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bmd_db_data:
